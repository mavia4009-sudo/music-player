<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://open.spotifycdn.com/cdn/images/favicon.0f31d2ea.ico" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/utility.css">
    <title>Spotify - Web Player: Music for everyone</title>



</head>

<body>
    <div class="container flex bg-black">
        <div class="left   ">
            <div class="close">
                <img width="50px" src="close.svg" alt="">
            </div>
            <div class="home bg-grey  rounded m-1 p-1">
                <div class="logo invert">
                    <img src="logo.svg" alt="">
                    <span class="invert">Spotify</span>

                </div>
                <ul>

                    <li><img class="invert" src="home.svg" alt="Home">Home</li>
                    <li><img class="invert" src="serach.svg" alt="Home">Search</li>

                </ul>

            </div>
            <div class="library bg-grey rounded m-1 p-1">
                <div class="heading">
                    <img src="playlist.svg" alt="">
                    <h2>Your Library</h2>
                </div>
                <div class="songlist">
                    <ul>

                    </ul>
                </div>
                <div class="footer">

                    <span>
                        <a href="https://www.spotify.com/pk-en/legal/" target="_blank">
                            Legal
                        </a>
                    </span>

                    <span>
                        <a href="https://www.spotify.com/pk-en/safetyandprivacy/" target="_blank">
                            SafetyPrivacy Center
                        </a>
                    </span>

                    <span>
                        <a href="https://www.spotify.com/pk-en/legal/privacy-policy/" target="_blank">
                            PrivacyPolicy
                        </a>
                    </span>

                    <span>
                        <a href="https://www.spotify.com/pk-en/legal/cookies-policy/" target="_blank">
                            Cookies
                        </a>
                    </span>

                    <span>
                        <a href="https://www.spotify.com/pk-en/legal/privacy-policy/#s3" target="_blank">
                            AboutAds
                        </a>
                    </span>

                    <span>
                        <a href="https://www.spotify.com/pk-en/accessibility/" target="_blank">
                            Accessibility
                        </a>
                    </span>


                </div>


            </div>





        </div>

        <div class="right bg-grey rounded    ">
            <div class="header">
                <div class="nav">

                    <div class="hamburgercontainer">
                        <img width="30" class="hamburger" src="hamburger.svg" alt="">

                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                            color="#ffffff" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path d="M15 18C15 18 9.00001 13.5811 9 12C8.99999 10.4188 15 6 15 6"></path>
                        </svg>
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                            color="#ffffff" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path d="M9.00005 18C9.00005 18 15 13.5811 15 12C15 10.4188 9 6 9 6"></path>
                        </svg>
                    </div>
                </div>
                <div class="button">
                    <button class="signbtn">Sign up</button>
                    <button class="logbtn">Log in</button>
                </div>
            </div>
            <div class="spotifyplaylist">
                <h1>Spotify Playlist</h1>
                <div class="cardcontainer "></div>
                        </div> 
                     <div class="playbary">
                        <div class="seekbar">
                            <div class="circle"></div>

                            </div>
                        <div class="abovebar">
                            <div class="songinfo">

                            </div>
                            <div class="songbutton">
                                <img width="30" id="prevwies" src="pre.svg" alt="">
                                <img width="30" id="play" src="play.svg" alt="">
                                <img width="30" id="next" src="next.svg" alt="">
                            </div>
                            <div class="timevol">
                                <div class="songtime">

                                </div>
                                <div class="volume">
                                    <img width="25" src="vloume.svg" alt="">
                                    <div class="range">
                                        <input type="range" min="0" max="100" value="10" name="volume" id="">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>



        </div>
         <script src="js/script.js"defer></script>

</body>

</html>
